<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>ITRMC Hospital Finance Dashboard</title>

<link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Source+Sans+Pro:300,400,400i,700">
<link rel="stylesheet" href="plugins/fontawesome-free/css/all.min.css">
<link rel="stylesheet" href="dist/css/adminlte.min.css">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/countup.js@1.9.3/dist/countUp.min.js"></script>

<style>

.small-box{
border-radius:14px;
transition:.3s;
}

.small-box:hover{
transform:translateY(-5px);
box-shadow:0 10px 20px rgba(0,0,0,.3);
}

.bg-blue{background:linear-gradient(45deg,#243B55,#141E30)}
.bg-green{background:linear-gradient(45deg,#11998e,#38ef7d)}
.bg-orange{background:linear-gradient(45deg,#f7971e,#ffd200)}
.bg-red{background:linear-gradient(45deg,#cb2d3e,#ef473a)}

.chart-container{
height:260px;
}

#trendChart{
height:240px !important;
}

.card{
border-radius:12px;
}

</style>

</head>


<body class="hold-transition layout-top-nav dark-mode layout-footer-fixed">

<div class="wrapper">

<nav class="main-header navbar navbar-dark navbar-expand-md">
<div class="container-fluid">

<a class="navbar-brand">
<i class="fas fa-hospital mr-2"></i>
ITRMC Hospital Finance Dashboard
</a>

</div>
</nav>


<div class="content-wrapper">

<section class="content pt-3">

<div class="container-fluid">

<!-- KPI ROW -->

<div class="row">

<div class="col-lg-3 col-6">
<div class="small-box bg-blue">
<div class="inner">
<h3 id="revenue">0</h3>
<p>Total Revenue</p>
</div>
<div class="icon"><i class="fas fa-coins"></i></div>
</div>
</div>

<div class="col-lg-3 col-6">
<div class="small-box bg-red">
<div class="inner">
<h3 id="expenses">0</h3>
<p>Total Expenses</p>
</div>
<div class="icon"><i class="fas fa-file-invoice-dollar"></i></div>
</div>
</div>

<div class="col-lg-3 col-6">
<div class="small-box bg-green">
<div class="inner">
<h3 id="net">0</h3>
<p>Net Income</p>
</div>
<div class="icon"><i class="fas fa-chart-line"></i></div>
</div>
</div>

<div class="col-lg-3 col-6">
<div class="small-box bg-orange">
<div class="inner">
<h3 id="transactions">0</h3>
<p>Total Transactions</p>
</div>
<div class="icon"><i class="fas fa-receipt"></i></div>
</div>
</div>

</div>



<!-- CHART ROW -->

<div class="row">

<div class="col-md-6">

<div class="card bg-dark">

<div class="card-header">
Revenue by Department
</div>

<div class="card-body">

<div class="chart-container">
<canvas id="deptChart"></canvas>
</div>

</div>

</div>

</div>


<div class="col-md-6">

<div class="card bg-dark">

<div class="card-header">
Payment Method Distribution
</div>

<div class="card-body">

<div class="chart-container">
<canvas id="paymentChart"></canvas>
</div>

</div>

</div>

</div>

</div>



<!-- TREND ROW -->

<div class="row">

<div class="col-md-12">

<div class="card bg-dark">

<div class="card-header">
Daily Revenue Trend
</div>

<div class="card-body">

<canvas id="trendChart"></canvas>

</div>

</div>

</div>

</div>


</div>

</section>

</div>


<footer class="main-footer text-center">
<strong>ITRMC Digital Tracker</strong>
</footer>

</div>



<script src="plugins/jquery/jquery.min.js"></script>
<script src="plugins/bootstrap/js/bootstrap.bundle.min.js"></script>
<script src="dist/js/adminlte.min.js"></script>



<script>

const API_URL="https://script.google.com/macros/s/AKfycbxjg4x9C7n9z7OoCyacxRRQXCI1sUCi37fwe98djkRUsrvfo6lhhrwn8ZLfAFUg0ELR/exec";

let deptChart
let paymentChart
let trendChart

function loadDashboard(){

fetch(API_URL)

.then(res=>res.json())

.then(data=>{

let revenue=0
let expenses=0

let dept={}
let payment={}
let trend={}

data.forEach(row=>{

let amount = Number(row.Amount) || 0
let category = (row.Category || "").toLowerCase().trim()

if(category==="revenue") revenue += amount
if(category==="expense") expenses += amount

let department=row.Department || "Unknown"
dept[department]=(dept[department]||0)+amount

let pay=row.Payment || "Other"
payment[pay]=(payment[pay]||0)+1

let date=(row.Date || "").substring(0,10)
trend[date]=(trend[date]||0)+amount

})

let net=revenue-expenses

document.getElementById("revenue").innerHTML=revenue.toLocaleString()
document.getElementById("expenses").innerHTML=expenses.toLocaleString()
document.getElementById("net").innerHTML=net.toLocaleString()
document.getElementById("transactions").innerHTML=data.length


// UPDATE CHARTS

if(deptChart){

deptChart.data.labels=Object.keys(dept)
deptChart.data.datasets[0].data=Object.values(dept)
deptChart.update()

paymentChart.data.labels=Object.keys(payment)
paymentChart.data.datasets[0].data=Object.values(payment)
paymentChart.update()

trendChart.data.labels=Object.keys(trend)
trendChart.data.datasets[0].data=Object.values(trend)
trendChart.update()

}

else{

deptChart=new Chart(document.getElementById("deptChart"),{

type:"bar",

data:{
labels:Object.keys(dept),
datasets:[{
label:"Amount",
data:Object.values(dept),
backgroundColor:["#17a2b8","#28a745","#ffc107","#dc3545","#6610f2"]
}]
},

options:{responsive:true,maintainAspectRatio:false}

})


paymentChart=new Chart(document.getElementById("paymentChart"),{

type:"pie",

data:{
labels:Object.keys(payment),
datasets:[{
data:Object.values(payment),
backgroundColor:["#17a2b8","#28a745","#ffc107"]
}]
},

options:{responsive:true,maintainAspectRatio:false}

})


trendChart=new Chart(document.getElementById("trendChart"),{

type:"line",

data:{
labels:Object.keys(trend),
datasets:[{
label:"Revenue",
data:Object.values(trend),
borderColor:"#17a2b8",
backgroundColor:"transparent",
tension:0.4
}]
},

options:{responsive:true,maintainAspectRatio:false}

})

}

})

.catch(err=>console.error(err))

}


// INITIAL LOAD
loadDashboard()

// AUTO LIVE UPDATE EVERY 5 SECONDS
setInterval(loadDashboard,5000)

</script>

</body>
</html>
